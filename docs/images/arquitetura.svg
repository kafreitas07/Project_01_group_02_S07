<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="gitGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#24292e"/>
      <stop offset="100%" stop-color="#4f565d"/>
    </linearGradient>
    <linearGradient id="nginxGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#009639"/>
      <stop offset="100%" stop-color="#00c853"/>
    </linearGradient>
    <linearGradient id="jenkinsGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#142C44"/>
      <stop offset="100%" stop-color="#1f3d5a"/>
    </linearGradient>
    <linearGradient id="agentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2496ED"/>
      <stop offset="100%" stop-color="#4aa3df"/>
    </linearGradient>
    <linearGradient id="newmanGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6C37"/>
      <stop offset="100%" stop-color="#ff8f66"/>
    </linearGradient>
    <linearGradient id="apiGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00C4B4"/>
      <stop offset="100%" stop-color="#7bf2e9"/>
    </linearGradient>
    <linearGradient id="emailGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D44B38"/>
      <stop offset="100%" stop-color="#f37a6b"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#718096"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#2496ED"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#D44B38"/>
    </marker>
  </defs>

  <style>
    .title { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; font-weight: bold; fill: #ffffff; }
    .subtitle { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 11px; fill: #e2e8f0; }
    .link-text { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 11px; fill: #4a5568; font-weight: bold; }
  </style>

  <!-- Background Canvas -->
  <rect width="100%" height="100%" fill="#f7fafc" rx="10"/>
  <rect width="100%" height="100%" fill="none" stroke="#e2e8f0" stroke-width="2" rx="10"/>

  <!-- Connections / Arrows -->
  
  <!-- Dev / QA to Nginx Proxy -->
  <path d="M 170 180 L 260 120" stroke="#718096" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="175" y="140" class="link-text">Acesso Web UI</text>

  <!-- Dev / QA to GitHub -->
  <path d="M 105 225 L 105 370" stroke="#718096" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="115" y="305" class="link-text">Push de Código</text>

  <!-- GitHub to Jenkins Server (Webhook) -->
  <path d="M 170 407 L 335 407 L 335 310" fill="none" stroke="#718096" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="185" y="395" class="link-text">Disparo por Webhook</text>

  <!-- Nginx Proxy to Jenkins Server -->
  <path d="M 335 145 L 335 230" stroke="#718096" stroke-width="2" stroke-dasharray="4" marker-end="url(#arrow)"/>
  <text x="345" y="190" class="link-text">Proxy Pass (80 → 8080)</text>

  <!-- Jenkins Server to Jenkins Agent -->
  <path d="M 410 270 L 520 270" stroke="#2496ED" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <text x="425" y="258" class="link-text" fill="#2496ED">Delega Tarefas</text>

  <!-- Jenkins Agent to Newman -->
  <path d="M 600 315 L 600 420" stroke="#718096" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="610" y="370" class="link-text">docker run</text>

  <!-- Newman to Swagger Petstore API -->
  <path d="M 680 457 L 800 457" stroke="#FF6C37" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="700" y="445" class="link-text" fill="#FF6C37">Testes HTTP</text>

  <!-- Newman Reports Back to Agent Workspace -->
  <path d="M 620 420 C 650 370, 740 370, 700 310" fill="none" stroke="#718096" stroke-width="2" stroke-dasharray="4" marker-end="url(#arrow)"/>
  <text x="690" y="355" class="link-text">Cópia de Relatórios (docker cp)</text>

  <!-- Jenkins Agent to Notificadora -->
  <path d="M 700 270 L 800 270" stroke="#718096" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="710" y="258" class="link-text">script-email.js</text>

  <!-- Notificadora back to Dev / QA (Email Notification) - Orthogonal/Square dashed line -->
  <path d="M 880 230 L 880 50 L 105 50 L 105 150" fill="none" stroke="#D44B38" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#arrow-red)"/>
  <text x="492.5" y="45" class="link-text" fill="#D44B38" text-anchor="middle">Notificação por E-mail (Via SMTP Externo)</text>


  <!-- Cards / Nodes -->

  <!-- User / Developer -->
  <g transform="translate(40, 150)" filter="url(#shadow)">
    <rect width="130" height="75" rx="8" fill="url(#gitGrad)"/>
    <text x="65" y="34" class="title" text-anchor="middle">Dev / QA</text>
    <text x="65" y="52" class="subtitle" text-anchor="middle">Ambiente Local</text>
  </g>

  <!-- GitHub -->
  <g transform="translate(40, 370)" filter="url(#shadow)">
    <rect width="130" height="75" rx="8" fill="url(#gitGrad)"/>
    <text x="65" y="34" class="title" text-anchor="middle">GitHub</text>
    <text x="65" y="52" class="subtitle" text-anchor="middle">Controle de Versão</text>
  </g>

  <!-- Nginx Proxy -->
  <g transform="translate(260, 70)" filter="url(#shadow)">
    <rect width="150" height="75" rx="8" fill="url(#nginxGrad)"/>
    <text x="75" y="34" class="title" text-anchor="middle">Nginx (Proxy)</text>
    <text x="75" y="52" class="subtitle" text-anchor="middle">Acesso Unificado</text>
  </g>

  <!-- Jenkins Controller -->
  <g transform="translate(260, 230)" filter="url(#shadow)">
    <rect width="150" height="80" rx="8" fill="url(#jenkinsGrad)"/>
    <text x="75" y="36" class="title" text-anchor="middle">Jenkins Server</text>
    <text x="75" y="54" class="subtitle" text-anchor="middle">Controller CI/CD</text>
  </g>

  <!-- Jenkins Agent -->
  <g transform="translate(520, 230)" filter="url(#shadow)">
    <rect width="180" height="85" rx="8" fill="url(#agentGrad)"/>
    <text x="90" y="32" class="title" text-anchor="middle">Jenkins Agent</text>
    <text x="90" y="50" class="subtitle" text-anchor="middle">Execução Isolada</text>
    <text x="90" y="66" class="subtitle" text-anchor="middle">Docker Socket Bind</text>
  </g>

  <!-- Newman -->
  <g transform="translate(520, 420)" filter="url(#shadow)">
    <rect width="160" height="75" rx="8" fill="url(#newmanGrad)"/>
    <text x="80" y="34" class="title" text-anchor="middle">Newman Container</text>
    <text x="80" y="52" class="subtitle" text-anchor="middle">Postman CLI</text>
  </g>

  <!-- Swagger Petstore API -->
  <g transform="translate(800, 420)" filter="url(#shadow)">
    <rect width="160" height="75" rx="8" fill="url(#apiGrad)"/>
    <text x="80" y="34" class="title" text-anchor="middle" fill="#1A202C">Swagger Petstore</text>
    <text x="80" y="52" class="subtitle" text-anchor="middle" fill="#2D3748">API Alvo (SUT)</text>
  </g>

  <!-- Relatórios & Notificações -->
  <g transform="translate(800, 230)" filter="url(#shadow)">
    <rect width="160" height="80" rx="8" fill="url(#emailGrad)"/>
    <text x="80" y="36" class="title" text-anchor="middle">Notificadora</text>
    <text x="80" y="54" class="subtitle" text-anchor="middle">Nodemailer &amp; HTML</text>
  </g>

</svg>
