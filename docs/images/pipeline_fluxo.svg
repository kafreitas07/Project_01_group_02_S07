<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 160" width="100%" height="100%">
  <defs>
    <!-- Gradients for steps -->
    <linearGradient id="stepGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a5568"/>
      <stop offset="100%" stop-color="#2d3748"/>
    </linearGradient>
    <linearGradient id="activeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2b6cb0"/>
      <stop offset="100%" stop-color="#1A365D"/>
    </linearGradient>
    <linearGradient id="successGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38a169"/>
      <stop offset="100%" stop-color="#22543d"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="3" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#a0aec0"/>
    </marker>
  </defs>

  <style>
    .step-title { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; font-weight: bold; fill: #ffffff; }
    .step-desc { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; fill: #e2e8f0; }
    .step-num { font-family: system-ui, -apple-system, sans-serif; font-size: 18px; font-weight: 800; fill: rgba(255,255,255,0.15); }
  </style>

  <!-- Background Canvas -->
  <rect width="100%" height="100%" fill="#f7fafc" rx="8"/>
  <rect width="100%" height="100%" fill="none" stroke="#e2e8f0" stroke-width="2" rx="8"/>

  <!-- Step Connections (Arrows) -->
  <line x1="125" y1="80" x2="150" y2="80" stroke="#a0aec0" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="265" y1="80" x2="290" y2="80" stroke="#a0aec0" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="405" y1="80" x2="430" y2="80" stroke="#a0aec0" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="545" y1="80" x2="570" y2="80" stroke="#a0aec0" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="685" y1="80" x2="710" y2="80" stroke="#a0aec0" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Step 1: Trigger -->
  <g transform="translate(15, 35)" filter="url(#shadow)">
    <rect width="110" height="90" rx="8" fill="url(#stepGrad)"/>
    <rect width="110" height="90" rx="8" fill="none" stroke="#4a5568" stroke-width="1"/>
    <text x="100" y="24" class="step-num" text-anchor="end">01</text>
    <text x="12" y="36" class="step-title">Trigger</text>
    <text x="12" y="54" class="step-desc">Push no GitHub</text>
    <text x="12" y="68" class="step-desc">ou manual</text>
  </g>

  <!-- Step 2: Checkout -->
  <g transform="translate(155, 35)" filter="url(#shadow)">
    <rect width="110" height="90" rx="8" fill="url(#stepGrad)"/>
    <rect width="110" height="90" rx="8" fill="none" stroke="#4a5568" stroke-width="1"/>
    <text x="100" y="24" class="step-num" text-anchor="end">02</text>
    <text x="12" y="36" class="step-title">Checkout</text>
    <text x="12" y="54" class="step-desc">Clona código</text>
    <text x="12" y="68" class="step-desc">no Agent</text>
  </g>

  <!-- Step 3: Dependencies -->
  <g transform="translate(295, 35)" filter="url(#shadow)">
    <rect width="110" height="90" rx="8" fill="url(#stepGrad)"/>
    <rect width="110" height="90" rx="8" fill="none" stroke="#4a5568" stroke-width="1"/>
    <text x="100" y="24" class="step-num" text-anchor="end">03</text>
    <text x="12" y="36" class="step-title">Dependências</text>
    <text x="12" y="54" class="step-desc">npm install &amp;</text>
    <text x="12" y="68" class="step-desc">limpa reports</text>
  </g>

  <!-- Step 4: Newman Run -->
  <g transform="translate(435, 35)" filter="url(#shadow)">
    <rect width="110" height="90" rx="8" fill="url(#activeGrad)"/>
    <rect width="110" height="90" rx="8" fill="none" stroke="#2b6cb0" stroke-width="1.5"/>
    <text x="100" y="24" class="step-num" text-anchor="end">04</text>
    <text x="12" y="36" class="step-title">Testes API</text>
    <text x="12" y="54" class="step-desc">Newman roda</text>
    <text x="12" y="68" class="step-desc">a suíte Postman</text>
  </g>

  <!-- Step 5: Reports -->
  <g transform="translate(575, 35)" filter="url(#shadow)">
    <rect width="110" height="90" rx="8" fill="url(#stepGrad)"/>
    <rect width="110" height="90" rx="8" fill="none" stroke="#4a5568" stroke-width="1"/>
    <text x="100" y="24" class="step-num" text-anchor="end">05</text>
    <text x="12" y="36" class="step-title">Relatórios</text>
    <text x="12" y="54" class="step-desc">Copia HTML extra</text>
    <text x="12" y="68" class="step-desc">pro workspace</text>
  </g>

  <!-- Step 6: Notify -->
  <g transform="translate(715, 35)" filter="url(#shadow)">
    <rect width="110" height="90" rx="8" fill="url(#successGrad)"/>
    <rect width="110" height="90" rx="8" fill="none" stroke="#38a169" stroke-width="1.5"/>
    <text x="100" y="24" class="step-num" text-anchor="end">06</text>
    <text x="12" y="36" class="step-title">Notificação</text>
    <text x="12" y="54" class="step-desc">Envia e-mail</text>
    <text x="12" y="68" class="step-desc">com relatórios</text>
  </g>
</svg>
